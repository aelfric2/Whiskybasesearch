<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisky AI Assistant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; text-align: center; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-strikt { background: #2c3e50; }
        .btn-kreativ { background: #27ae60; }
        .btn-google { background: #3498db; }
        #output { text-align: left; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Whisky Analyse</h3>
        <p id="input-text">Lade Daten...</p>
    </div>

    <button class="btn-strikt" onclick="analyze('strikt')">💎 AI-Strikt (Datenbank)</button>
    <button class="btn-kreativ" onclick="analyze('kreativ')">🧪 AI-Kreativ</button>
    <button class="btn-google" onclick="googleSearch()">🔍 Google</button>

    <div id="output" class="card">Ergebnis erscheint hier...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const text = params.get('text') || "Kein Text übergeben";
        document.getElementById('input-text').innerText = "Text: " + text;

        async function getDB() {
            const response = await fetch('https://api.github.com/gists/5dd08669d7d4b4a9f3b25d1b98e91120');
            const data = await response.json();
            return data.files['whiskydb.json'].content;
        }

        async function analyze(mode) {
            let prompt = mode === 'strikt' 
                ? "Nutze diese Datenbank: " + await getDB() + ". Formatiere den Whisky exakt nach Schema: Brennerei + Abfüller + Jahr. Hier der Text: " + text
                : "Analysiere diese Tasting Notes oder Whisky-Infos: " + text;
            
            // Hier API Key abfragen, falls nicht im localStorage
            let key = localStorage.getItem('GEMINI_KEY') || prompt("Bitte API-Key eingeben:");
            localStorage.setItem('GEMINI_KEY', key);

            document.getElementById('output').innerText = "KI denkt nach...";
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
            });
            const json = await res.json();
            document.getElementById('output').innerText = json.candidates[0].content.parts[0].text;
        }

        function googleSearch() { window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(text + " Whiskybase"); }
    </script>
</body>
</html>

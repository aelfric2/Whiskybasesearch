<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisky AI Assistant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; text-align: center; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-strikt { background: #2c3e50; }
        .btn-kreativ { background: #27ae60; }
        .btn-google { background: #3498db; }
        .btn-whiskybase { background: #e67e22; }
        .btn-reset { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; display: inline-block; }
        #output { text-align: left; white-space: pre-wrap; margin-top: 20px; padding: 15px; border-radius: 8px; background: #fff; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Whisky Analyse</h3>
        <p id="input-text">Lade...</p>
        <input type="password" id="api-key-input" placeholder="API-Key hier einfügen">
        <button class="btn-reset" onclick="resetKey()">Key löschen</button>
    </div>

    <button class="btn-strikt" onclick="analyze('strikt')">💎 AI-Strikt (Datenbank)</button>
    <button class="btn-kreativ" onclick="analyze('kreativ')">🧪 AI-Kreativ</button>

    <div id="output" class="card">Ergebnis erscheint hier...</div>

    <button class="btn-google" onclick="googleSearch()">🔍 Google Suche</button>
    <button class="btn-whiskybase" onclick="whiskybaseSearch()">🥃 Whiskybase Suche</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rawText = params.get('text') || "";
        const text = rawText.replace(/['"]/g, '').trim();
        let cleanedName = ""; 
        
        const inputField = document.getElementById('api-key-input');
        inputField.value = localStorage.getItem('API_KEY') || "";
        
        async function getDB() {
            try {
                const response = await fetch('https://api.github.com/gists/5dd08669d7d4b4a9f3b25d1b98e91120');
                const data = await response.json();
                const fileName = Object.keys(data.files)[0];
                return data.files[fileName].content;
            } catch (err) { return ""; }
        }

        async function analyze(mode) {
            if (!text) return alert("Kein Text vorhanden!");
            let key = inputField.value.trim();
            if (!key) return alert("Bitte API-Key eingeben!");
            localStorage.setItem('API_KEY', key);

            document.getElementById('output').innerText = "KI denkt nach...";

            const dbContent = await getDB();
            const lines = dbContent.split('\n');
            const match = lines.find(line => text.toLowerCase().includes(line.toLowerCase().split(' ')[0]));

            if (mode === 'strikt' && !match) {
                document.getElementById('output').innerText = "Nicht in meiner Datenbank gefunden.";
                return;
            }

            // NEUER PROMPT: Strikte Extraktion
            const prompt = mode === 'strikt' 
                ? `Du bist eine reine Extraktions-Maschine. Dein Input ist: "${text}". Die Referenz aus der DB ist: "${match}".
                Regeln:
                1. Extrahiere NUR die Begriffe, die auch in der DB-Referenz oder im Text vorkommen.
                2. Wenn Jahreszahlen da sind (z.B. 2012/2025), nimm IMMER nur das niedrigste Jahr.
                3. Ignoriere Füllwörter wie "Batch", "Release", "Single Malt".
                4. Gib das Ergebnis als Kette aus: "Brennerei + [Abfüller wenn vorhanden] + Jahr". 
                5. Wenn Abfüller fehlt, lasse ihn komplett weg. Keine Dopplungen.`
                : "Analysiere diese Whisky-Infos: " + text;

            try {
                // ... (API-Aufrufe bleiben identisch)
                // ... (Rest der Logik identisch)
                // Nach Erhalt von responseText:
                cleanedName = responseText.trim();
                document.getElementById('output').innerText = cleanedName;
            } catch (error) { document.getElementById('output').innerText = "Fehler: " + error.message; }
        }

        // Such-Funktionen nutzen cleanedName oder text
        function googleSearch() { window.location.href = "https://www.google.com/search?q=" + encodeURIComponent((cleanedName || text) + " Whiskybase"); }
        function whiskybaseSearch() { window.location.href = "https://www.whiskybase.com/search?q=" + encodeURIComponent(cleanedName || text); }
        function resetKey() { localStorage.removeItem('API_KEY'); inputField.value = ""; alert("Key gelöscht."); }
    </script>
</body>
</html>

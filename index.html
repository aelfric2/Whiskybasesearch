<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisky AI Assistant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; text-align: center; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-strikt { background: #2c3e50; }
        .btn-kreativ { background: #27ae60; }
        .btn-google { background: #3498db; }
        .btn-whiskybase { background: #e67e22; }
        .btn-reset { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; display: inline-block; }
        #output { text-align: left; white-space: pre-wrap; margin-top: 20px; padding: 15px; border-radius: 8px; background: #fff; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Whisky Analyse</h3>
        <p id="input-text">Lade...</p>
        <input type="password" id="api-key-input" placeholder="API-Key hier einfügen">
        <button class="btn-reset" onclick="resetKey()">Key löschen</button>
    </div>

    <button class="btn-strikt" onclick="analyze('strikt')">💎 AI-Strikt (Datenbank)</button>
    <button class="btn-kreativ" onclick="analyze('kreativ')">🧪 AI-Kreativ</button>

    <div id="output" class="card">Ergebnis erscheint hier...</div>

    <button class="btn-google" onclick="googleSearch()">🔍 Google Suche (Original)</button>
    <button class="btn-whiskybase" onclick="whiskybaseSearch()">🥃 Whiskybase Suche (KI-Bereinigt)</button>

    <script>
        let text = "";
        let cleanedName = "";
        const inputField = document.getElementById('api-key-input');

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const rawText = params.get('text') || "";
            text = decodeURIComponent(rawText.replace(/\+/g, ' ')).replace(/['"]/g, '').trim();
            inputField.value = localStorage.getItem('API_KEY') || "";
            document.getElementById('input-text').innerText = text ? "Text: " + text : "Kein Text übergeben";
        };

        async function getDB() {
            try {
                const response = await fetch('https://api.github.com/gists/5dd08669d7d4b4a9f3b25d1b98e91120');
                const data = await response.json();
                const fileName = Object.keys(data.files)[0];
                return data.files[fileName].content;
            } catch (err) { return ""; }
        }

        async function analyze(mode) {
            if (!text) return alert("Kein Text vorhanden!");
            let key = inputField.value.trim();
            if (!key) return alert("Bitte API-Key eingeben!");
            localStorage.setItem('API_KEY', key);
            document.getElementById('output').innerText = "KI extrahiert Begriffe...";

            const dbContent = await getDB();
            
            // Deterministischer Prompt mit Temperatur 0
            const prompt = mode === 'strikt' 
                ? `Input-Text: "${text}"\nWhitelist: "${dbContent}"\nAufgabe: Extrahiere nur Wörter aus der Whitelist und das Destillationsjahr. Ausgabe: "Brennerei + Abfüller + Jahr". Beispiel: "Teerenpeli 2013 Best Dram". Keine Erklärung.`
                : "Analysiere: " + text;

            try {
                let responseText = "";
                if (key.startsWith('sk-')) {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ 
                            model: "gpt-4o-mini", 
                            temperature: 0, 
                            messages: [{ role: "user", content: prompt }] 
                        })
                    });
                    const data = await response.json();
                    responseText = data.choices[0].message.content;
                } else {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }] }], 
                            generationConfig: { temperature: 0 } 
                        })
                    });
                    const data = await response.json();
                    responseText = data.candidates[0].content.parts[0].text;
                }
                cleanedName = responseText.replace(/[^a-zA-Z0-9 ]/g, '').trim();
                document.getElementById('output').innerText = cleanedName;
            } catch (error) { document.getElementById('output').innerText = "Fehler: " + error.message; }
        }

        // Google nutzt immer den Original-Text + Zusatz "Whiskybase"
        function googleSearch() { 
            window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(text + " Whiskybase"); 
        }

        // Whiskybase nutzt bevorzugt den bereinigten Namen
        function whiskybaseSearch() { 
            const searchName = cleanedName || text;
            window.location.href = "https://www.whiskybase.com/search?q=" + encodeURIComponent(searchName); 
        }

        function resetKey() { 
            localStorage.removeItem('API_KEY'); 
            inputField.value = ""; 
            alert("Key gelöscht."); 
        }
    </script>
</body>
</html>
